name: 🚀 BondSpace Mobile — Build & OTA Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Give the workflow permission to create releases
permissions:
  contents: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build Next.js static export + OTA bundle
  # ─────────────────────────────────────────────
  build-web:
    name: 📦 Build Web Bundle
    runs-on: ubuntu-latest
    outputs:
      bundle_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build static export (mobile)
        working-directory: frontend
        run: npm run build:mobile
        env:
          MOBILE_BUILD: true
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}

      - name: Create bundle.zip from out/
        working-directory: frontend
        run: zip -r bundle.zip out/

      - name: Generate release tag
        id: tag
        run: |
          TAG="bundle-$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Bundle tag: $TAG"

      - name: Upload bundle.zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: frontend/bundle.zip
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Build Android APK
  # ─────────────────────────────────────────────
  build-apk:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: frontend/

      - name: Unzip web bundle to out/
        working-directory: frontend
        run: unzip -o bundle.zip

      - name: Capacitor sync (Android)
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk BondSpace.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bondspace-apk
          path: BondSpace.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 3: Publish GitHub Release with both assets
  # ─────────────────────────────────────────────
  release:
    name: 🎉 Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-web, build-apk]
    steps:
      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-bundle
          path: ./assets

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: bondspace-apk
          path: ./assets

      - name: Delete old "latest-bundle" release (if exists)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-bundle --repo ${{ github.repository }} --yes || true
          git push origin :refs/tags/latest-bundle || true

      - name: Create GitHub Release — latest-bundle (OTA pointer)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-bundle
          name: "🔄 Latest OTA Bundle"
          body: |
            ## Auto-Updated Bundle
            
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built at:** `${{ github.event.head_commit.timestamp }}`
            
            The `bundle.zip` file is downloaded by installed BondSpace APKs to update themselves automatically.
          files: |
            ./assets/bundle.zip
            ./assets/BondSpace.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-web.outputs.bundle_tag }}
          name: "Bundle ${{ needs.build-web.outputs.bundle_tag }}"
          body: |
            Snapshot build from commit `${{ github.sha }}`.
          files: |
            ./assets/bundle.zip
            ./assets/BondSpace.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
