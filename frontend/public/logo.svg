<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Ambient Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#nebula)" />
  
  <!-- Celestial Ring -->
  <ellipse cx="256" cy="256" rx="180" ry="60" stroke="white" stroke-opacity="0.2" stroke-width="4" transform="rotate(-30 256 256)" fill="none" />
  
  <!-- Main Heart Shape -->
  <path d="M256 420c-10-10-160-150-160-240 0-60 40-100 90-100 30 0 60 20 70 50 10-30 40-50 70-50 50 0 90 40 90 100 0 90-150 230-160 240z" fill="url(#heartGradient)" filter="url(#glow)" />
  
  <!-- Infinity Loop Accent -->
  <path d="M210 230c-20 0-40 20-40 40s20 40 40 40 60-30 92-30 60 30 60 50-20 40-40 40-40-20-40-40 20-40 40-40" stroke="white" stroke-opacity="0.4" stroke-width="6" stroke-linecap="round" fill="none" />
</svg>
